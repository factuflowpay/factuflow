<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FactuFlow — Centro de Facturación</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Lato:wght@300;400;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --bg:#080b12;--bg2:#0d1117;--surf:#111827;--card:#141c2b;--card2:#192032;
  --bdr:#1e2a3d;--bdr2:#243248;
  --gold:#c9943a;--gold2:#e8b85a;--gold3:#f5d48a;
  --goldbg:rgba(201,148,58,.09);--goldbdr:rgba(201,148,58,.28);
  --teal:#1fb8a8;--tealbg:rgba(31,184,168,.09);--tealbdr:rgba(31,184,168,.28);
  --red:#e05252;--redbg:rgba(224,82,82,.09);--redbdr:rgba(224,82,82,.28);
  --green:#3dbf7a;--greenbg:rgba(61,191,122,.09);--greenbdr:rgba(61,191,122,.28);
  --blue:#4a85d4;--bluebg:rgba(74,133,212,.09);--bluebdr:rgba(74,133,212,.28);
  --purple:#9b72d6;--purplebg:rgba(155,114,214,.09);--purplebdr:rgba(155,114,214,.28);
  --txt:#dde3f0;--txt2:#a8b3c8;--muted:#5a6880;
  --font:'DM Sans',sans-serif;--serif:'Playfair Display',serif;--mono:'DM Mono',monospace;
  /* company theme vars — updated dynamically */
  --co-color:#c9943a;--co-color2:#e8b85a;--co-colorbg:rgba(201,148,58,.09);--co-colorbdr:rgba(201,148,58,.28);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:var(--font);color:var(--txt);font-size:14px;}
input,select,textarea,button{font-family:var(--font);}

/* grain + grid */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.05'/%3E%3C/svg%3E");
  opacity:.35;mix-blend-mode:overlay;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(201,148,58,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(201,148,58,.025) 1px,transparent 1px);
  background-size:44px 44px;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px;}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;position:relative;z-index:1;flex-direction:column;}
#app-inner{display:flex;flex:1;overflow:hidden;}

/* ── COMPANY HEADER BAR ── */
#co-header{
  height:46px;flex-shrink:0;
  background:linear-gradient(90deg,var(--co-color) 0%,var(--co-color2) 100%);
  display:flex;align-items:center;padding:0 20px;gap:12px;
  position:relative;z-index:20;
  box-shadow:0 2px 20px rgba(0,0,0,.4);
}
#co-header-logo{width:28px;height:28px;border-radius:6px;object-fit:contain;background:rgba(255,255,255,.9);padding:3px;flex-shrink:0;}
#co-header-name{font-family:var(--serif);font-size:15px;font-weight:700;color:#fff;flex:1;letter-spacing:.3px;text-shadow:0 1px 3px rgba(0,0,0,.3);}
#co-header-initials{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;border:1px solid rgba(255,255,255,.3);}
#co-header-datetime{font-size:11.5px;color:rgba(255,255,255,.85);text-align:right;line-height:1.5;flex-shrink:0;}
#co-header-change{
  padding:4px 10px;border-radius:6px;
  background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);
  color:#fff;font-size:11.5px;cursor:pointer;transition:background .18s;flex-shrink:0;
}
#co-header-change:hover{background:rgba(255,255,255,.28);}

/* ── SIDEBAR ── */
#sidebar{
  width:242px;flex-shrink:0;
  background:linear-gradient(180deg,#0d1420 0%,#080e19 100%);
  border-right:1px solid var(--bdr);
  display:flex;flex-direction:column;overflow:hidden;position:relative;
}
#sidebar::before{content:'';position:absolute;top:-60px;left:-60px;width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,148,58,.06) 0%,transparent 70%);pointer-events:none;}
.sb-logo{padding:16px 18px 12px;border-bottom:1px solid var(--bdr);}
.sb-logo-row{display:flex;align-items:center;gap:9px;}
.sb-logo-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 3px 10px rgba(201,148,58,.3);}
.sb-logo h1{font-family:"Syne",var(--serif),sans-serif;font-size:19px;font-weight:800;color:var(--gold2);letter-spacing:-.3px;}
.sb-logo p{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-top:5px;}
.sb-nav{padding:10px;flex:1;overflow-y:auto;}
.sb-sec{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin:12px 6px 5px;font-weight:600;}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;font-size:13px;font-weight:500;
  cursor:pointer;color:var(--txt2);transition:all .18s;margin-bottom:2px;position:relative;border:1px solid transparent;}
.sb-item:hover{background:rgba(255,255,255,.04);color:var(--txt);}
.sb-item.active{background:var(--co-colorbg);color:var(--co-color2);border-color:var(--co-colorbdr);}
.sb-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);
  width:3px;height:60%;background:var(--co-color2);border-radius:0 2px 2px 0;}
.sb-item svg{flex-shrink:0;opacity:.8;}.sb-item.active svg{opacity:1;}
.sb-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:20px;font-size:10px;padding:1px 7px;font-weight:700;}
.sb-badge.warn{background:var(--gold);}
.sb-footer{padding:10px 14px;border-top:1px solid var(--bdr);font-size:11px;color:var(--muted);}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#topbar{height:54px;flex-shrink:0;background:rgba(13,17,23,.92);border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;padding:0 22px;gap:10px;backdrop-filter:blur(10px);position:relative;z-index:10;}
.tb-back{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:8px;
  background:transparent;border:1px solid var(--bdr2);color:var(--txt2);font-size:12px;cursor:pointer;transition:all .18s;flex-shrink:0;}
.tb-back:hover{border-color:var(--co-colorbdr);color:var(--co-color2);}
.tb-title{flex:1;font-family:var(--serif);font-size:20px;font-weight:600;letter-spacing:.2px;}
.tb-actions{display:flex;gap:8px;align-items:center;}
#content{flex:1;overflow-y:auto;padding:22px;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 17px;border-radius:9px;border:none;
  font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn-co{background:linear-gradient(135deg,var(--co-color),var(--co-color2));color:#0a0e17;box-shadow:0 3px 12px rgba(0,0,0,.25);}
.btn-co:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-outline{background:transparent;border:1px solid var(--bdr2);color:var(--txt2);}
.btn-outline:hover{border-color:var(--co-colorbdr);color:var(--co-color2);}
.btn-red{background:var(--redbg);border:1px solid var(--redbdr);color:var(--red);}
.btn-red:hover{background:rgba(224,82,82,.18);}
.btn-teal{background:var(--tealbg);border:1px solid var(--tealbdr);color:var(--teal);}
.btn-teal:hover{background:rgba(31,184,168,.18);}
.btn-green{background:var(--greenbg);border:1px solid var(--greenbdr);color:var(--green);}
.btn-ghost{background:transparent;border:none;color:var(--muted);padding:5px 8px;border-radius:7px;}
.btn-ghost:hover{color:var(--txt);background:rgba(255,255,255,.05);}
.btn-sm{padding:6px 12px;font-size:12px;} .btn-xs{padding:4px 9px;font-size:11px;}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;}
.card-head{padding:15px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.card-head-title{font-size:13.5px;font-weight:600;}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:20px;position:relative;overflow:hidden;transition:all .2s;cursor:default;}
.stat-card:hover{border-color:var(--co-colorbdr);transform:translateY(-2px);}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.8px;color:var(--muted);margin-bottom:9px;font-weight:600;}
.stat-val{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--co-color2);line-height:1;margin-bottom:6px;}
.stat-sub{font-size:11.5px;color:var(--muted);}
.stat-icon{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--co-colorbg);border:1px solid var(--co-colorbdr);}

/* ── TABLE ── */
.table-wrap{
  overflow-x:auto;
  overflow-y:auto;
  max-height:calc(100vh - 220px);
  /* always-visible scrollbar */
  scrollbar-width:thin;
  scrollbar-color:var(--bdr2) transparent;
}
.table-wrap::-webkit-scrollbar{width:6px;height:8px;}
.table-wrap::-webkit-scrollbar-track{background:rgba(255,255,255,.03);border-radius:4px;}
.table-wrap::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:4px;}
.table-wrap::-webkit-scrollbar-thumb:hover{background:var(--co-colorbdr);}
.table-wrap::-webkit-scrollbar-corner{background:transparent;}
table{width:100%;border-collapse:collapse;min-width:900px;}
thead tr{border-bottom:1px solid var(--bdr2);}
/* STICKY HEADERS */
thead{position:sticky;top:0;z-index:10;}
th{
  padding:10px 14px;font-size:10px;text-transform:uppercase;
  letter-spacing:1.8px;color:var(--muted);font-weight:600;text-align:left;white-space:nowrap;
  background:var(--card);
  border-bottom:1px solid var(--bdr2);
  backdrop-filter:blur(8px);
}
td{padding:12px 14px;border-bottom:1px solid rgba(30,42,61,.5);vertical-align:middle;font-size:13px;}
tr:last-child td{border-bottom:none;}
tbody tr{transition:background .12s;}
tbody tr:hover td{background:rgba(255,255,255,.02);}
tbody tr.selected-row td{background:var(--co-colorbg)!important;}
.row-overdue td{background:rgba(224,82,82,.03)!important;}
.td-id{font-family:var(--mono);font-size:11.5px;color:var(--co-color2);font-weight:500;}
.td-name{font-weight:500;} .td-muted{color:var(--txt2);font-size:12.5px;}
.td-amount{font-weight:600;font-variant-numeric:tabular-nums;}

/* ── CHECKBOX ── */
.cb-cell{width:38px;padding:12px 0 12px 14px!important;}
.cb{width:16px;height:16px;accent-color:var(--co-color);cursor:pointer;}

/* ── BULK ACTION BAR ── */
#bulk-bar{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--card2);border:1px solid var(--co-colorbdr);border-radius:14px;
  padding:12px 20px;display:flex;align-items:center;gap:14px;
  box-shadow:0 8px 30px rgba(0,0,0,.5),0 0 0 1px var(--co-colorbdr);
  z-index:500;animation:bulkIn .25s ease;
  backdrop-filter:blur(10px);
}
@keyframes bulkIn{from{transform:translateX(-50%) translateY(20px);opacity:0;}}
#bulk-bar .bulk-count{font-weight:700;color:var(--co-color2);font-size:14px;}
#bulk-bar .bulk-sep{width:1px;height:20px;background:var(--bdr2);}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;}
.badge-gold{background:var(--goldbg);color:var(--gold2);border:1px solid var(--goldbdr);}
.badge-blue{background:var(--bluebg);color:var(--blue);border:1px solid var(--bluebdr);}
.badge-green{background:var(--greenbg);color:var(--green);border:1px solid var(--greenbdr);}
.badge-red{background:var(--redbg);color:var(--red);border:1px solid var(--redbdr);}
.badge-teal{background:var(--tealbg);color:var(--teal);border:1px solid var(--tealbdr);}
.badge-purple{background:var(--purplebg);color:var(--purple);border:1px solid var(--purplebdr);}

/* ── ALERTS ── */
.alert{border-radius:11px;padding:13px 16px;display:flex;align-items:center;gap:12px;margin-bottom:14px;font-size:13px;cursor:pointer;transition:opacity .2s;}
.alert:hover{opacity:.85;}
.alert-red{background:var(--redbg);border:1px solid var(--redbdr);color:var(--red);}
.alert-teal{background:var(--tealbg);border:1px solid var(--tealbdr);color:var(--teal);}
.alert-gold{background:var(--goldbg);border:1px solid var(--goldbdr);color:var(--gold2);}
.alert-green{background:var(--greenbg);border:1px solid var(--greenbdr);color:var(--green);}

/* ── MODALS ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:20px;backdrop-filter:blur(6px);animation:fadeIn .15s ease;}
@keyframes fadeIn{from{opacity:0;}}
.modal{background:linear-gradient(160deg,#141c2b 0%,#0f1623 100%);border:1px solid var(--bdr2);border-radius:18px;
  width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .22s ease;box-shadow:0 24px 60px rgba(0,0,0,.7);}
@keyframes slideUp{from{transform:translateY(24px);opacity:0;}}
.modal-sm{max-width:440px;} .modal-md{max-width:640px;} .modal-lg{max-width:860px;} .modal-xl{max-width:1060px;}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0;}
.modal-head h3{font-family:var(--serif);font-size:20px;font-weight:600;}
.modal-body{padding:24px;} .modal-foot{padding:15px 24px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:10px;}

/* ── FORMS ── */
.form-grid{display:grid;gap:15px;}
.g2{grid-template-columns:1fr 1fr;} .g3{grid-template-columns:1fr 1fr 1fr;} .g4{grid-template-columns:1fr 1fr 1fr 1fr;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:10.5px;text-transform:uppercase;letter-spacing:1.4px;color:var(--txt2);font-weight:600;}
.field input,.field select,.field textarea{background:rgba(255,255,255,.04);border:1px solid var(--bdr2);color:var(--txt);
  padding:9px 12px;border-radius:9px;font-family:var(--font);font-size:13px;outline:none;transition:border-color .18s,background .18s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--co-colorbdr);background:var(--co-colorbg);}
.field textarea{resize:vertical;min-height:72px;} .field select option{background:#141c2b;}
.field-hint{font-size:11px;color:var(--muted);}

.money-row{display:flex;gap:7px;}
.money-row input{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--bdr2);color:var(--txt);
  padding:9px 12px;border-radius:9px;font-family:var(--font);font-size:13px;outline:none;transition:border-color .18s;}
.money-row input:focus{border-color:var(--co-colorbdr);}
.money-row select{width:100px;flex-shrink:0;background:rgba(255,255,255,.04);border:1px solid var(--bdr2);color:var(--txt);
  padding:9px 8px;border-radius:9px;font-family:var(--font);font-size:12px;outline:none;}
.money-row select option{background:#141c2b;}

.phone-row{display:flex;gap:7px;}
.phone-cc{width:126px;flex-shrink:0;background:rgba(255,255,255,.04);border:1px solid var(--bdr2);color:var(--txt);
  padding:9px 8px;border-radius:9px;font-family:var(--font);font-size:12px;outline:none;}
.phone-cc option{background:#141c2b;}
.phone-num{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--bdr2);color:var(--txt);
  padding:9px 12px;border-radius:9px;font-family:var(--font);font-size:13px;outline:none;}
.phone-num:focus{border-color:var(--co-colorbdr);}

/* ── INVOICE LINES ── */
.inv-line-head{display:grid;grid-template-columns:1fr 65px 145px 110px 30px;gap:8px;margin-bottom:5px;padding:0 2px;}
.inv-line-head span{font-size:10px;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted);font-weight:600;}
.inv-line-row{display:grid;grid-template-columns:1fr 65px 145px 110px 30px;gap:8px;margin-bottom:7px;align-items:center;}
.inv-line-row input,.inv-line-row select{background:rgba(255,255,255,.04);border:1px solid var(--bdr2);color:var(--txt);
  padding:8px 10px;border-radius:9px;font-family:var(--font);font-size:13px;outline:none;width:100%;}
.inv-line-row input:focus{border-color:var(--co-colorbdr);}
.line-total{font-size:13px;font-weight:600;color:var(--co-color2);font-variant-numeric:tabular-nums;}

/* ── TAGS ── */
.tag-wrap{display:flex;flex-wrap:wrap;gap:5px;align-items:center;background:rgba(255,255,255,.04);border:1px solid var(--bdr2);
  border-radius:9px;padding:7px 11px;min-height:42px;}
.tag-wrap:focus-within{border-color:var(--co-colorbdr);}
.tag{background:var(--co-colorbg);color:var(--co-color2);border:1px solid var(--co-colorbdr);
  padding:3px 9px;border-radius:20px;font-size:11.5px;display:flex;align-items:center;gap:4px;}
.tag button{background:none;border:none;color:inherit;cursor:pointer;padding:0;font-size:14px;line-height:1;}
.tag-input{background:none;border:none;outline:none;color:var(--txt);font-size:13px;min-width:110px;font-family:var(--font);}

/* ── TABS ── */
.tabs{display:flex;gap:3px;background:rgba(255,255,255,.03);border-radius:10px;padding:4px;margin-bottom:18px;border:1px solid var(--bdr);}
.tab-btn{padding:7px 15px;border-radius:7px;font-size:13px;cursor:pointer;color:var(--muted);transition:all .15s;font-weight:500;border:none;background:transparent;}
.tab-btn.on{background:var(--card2);color:var(--co-color2);box-shadow:0 2px 8px rgba(0,0,0,.25);}

/* ── SEARCH ── */
.search-wrap{position:relative;}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.search-input{background:rgba(255,255,255,.04);border:1px solid var(--bdr2);color:var(--txt);
  padding:8px 12px 8px 33px;border-radius:9px;font-family:var(--font);font-size:13px;outline:none;width:200px;}
.search-input:focus{border-color:var(--co-colorbdr);}

/* ── COLOR DOTS ── */
.color-dots{display:flex;gap:7px;flex-wrap:wrap;}
.cdot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .18s;}
.cdot.on{border-color:rgba(255,255,255,.9);transform:scale(1.15);}

/* ── LOGO DROP ── */
.logo-drop{border:2px dashed var(--bdr2);border-radius:11px;padding:18px;text-align:center;cursor:pointer;transition:all .2s;background:rgba(255,255,255,.02);}
.logo-drop:hover{border-color:var(--co-colorbdr);background:var(--co-colorbg);}
.logo-prev{width:100px;height:60px;object-fit:contain;border-radius:6px;background:white;padding:4px;margin:0 auto 8px;display:block;}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--bdr);margin:17px 0;}

/* ── CALENDAR DAY PICKER ── */
.day-picker{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:6px;}
.day-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:7px;font-size:12px;
  cursor:pointer;border:1px solid var(--bdr2);color:var(--txt2);transition:all .15s;background:rgba(255,255,255,.03);}
.day-cell:hover{border-color:var(--co-colorbdr);color:var(--co-color2);}
.day-cell.on{background:var(--co-colorbg);border-color:var(--co-colorbdr);color:var(--co-color2);font-weight:700;}
.day-cell.muted{opacity:.3;cursor:default;}

/* ── UPCOMING SECTION ── */
.upcoming-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:20px;}
.upcoming-card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px 16px;
  display:flex;align-items:center;gap:12px;transition:all .2s;cursor:pointer;}
.upcoming-card:hover{border-color:var(--co-colorbdr);transform:translateY(-1px);}
.upcoming-card.urgent{border-color:var(--redbdr);background:var(--redbg);}
.upcoming-card.today{border-color:var(--goldbdr);background:var(--goldbg);}
.upcoming-card.selected-uc{border-color:var(--co-colorbdr);background:var(--co-colorbg);}
.uc-avatar{width:38px;height:38px;border-radius:10px;background:var(--co-colorbg);color:var(--co-color2);
  font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.uc-name{font-weight:600;font-size:13.5px;margin-bottom:2px;}
.uc-date{font-size:11.5px;color:var(--muted);}
.uc-amount{margin-left:auto;font-weight:700;font-size:14px;color:var(--co-color2);text-align:right;flex-shrink:0;}
.uc-days{font-size:11px;color:var(--muted);text-align:right;}

/* ── REPORTS ── */
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.mini-chart{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:18px;}
.mini-chart-title{font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:14px;text-transform:uppercase;letter-spacing:1.2px;}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:80px;}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar{width:100%;border-radius:4px 4px 0 0;background:linear-gradient(0deg,var(--co-color),var(--co-color2));min-height:4px;transition:height .4s ease;}
.bar-lbl{font-size:10px;color:var(--muted);}
.bar-val{font-size:10px;color:var(--co-color2);font-weight:600;}
.freq-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:600;}

/* ── INVOICE TEMPLATES ── */
.tmpl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.tmpl-card{border:2px solid var(--bdr2);border-radius:10px;padding:10px;cursor:pointer;transition:all .18s;text-align:center;}
.tmpl-card:hover{border-color:var(--co-colorbdr);}
.tmpl-card.on{border-color:var(--co-color2);background:var(--co-colorbg);}
.tmpl-thumb{height:80px;border-radius:6px;margin-bottom:6px;overflow:hidden;background:white;}
.tmpl-name{font-size:12px;font-weight:600;color:var(--txt2);}

/* ── INVOICE PREVIEW ── */
.inv-preview{background:white;color:#1a1e2e;border-radius:10px;padding:48px;font-family:'DM Sans',Arial,sans-serif;font-size:13px;box-shadow:0 4px 30px rgba(0,0,0,.3);}

/* template: modern */
.inv-modern .inv-top{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;margin-bottom:32px;}
.inv-modern .inv-brand-logo{height:52px;object-fit:contain;margin-bottom:7px;display:block;}
.inv-modern .inv-brand-name{font-size:20px;font-weight:700;margin-bottom:3px;}
.inv-modern .inv-brand-info{font-size:12px;color:#5a6678;line-height:1.9;}
.inv-modern .inv-right{text-align:right;}
.inv-modern .inv-title-txt{font-size:34px;font-weight:900;text-transform:uppercase;letter-spacing:2px;}
.inv-modern .inv-meta{font-size:12px;color:#666;margin-top:6px;line-height:2;}
.inv-modern .inv-divider{height:3px;border-radius:2px;margin:26px 0;}
/* template: classic */
.inv-classic .inv-top{text-align:center;border-bottom:2px solid;padding-bottom:20px;margin-bottom:24px;}
.inv-classic .inv-brand-logo{height:56px;object-fit:contain;margin:0 auto 8px;display:block;}
.inv-classic .inv-brand-name{font-family:'Merriweather',serif;font-size:22px;font-weight:700;margin-bottom:4px;}
.inv-classic .inv-brand-info{font-size:12px;color:#666;line-height:1.8;}
.inv-classic .inv-meta-row{display:flex;justify-content:space-between;background:#f8f9fb;padding:12px 16px;border-radius:6px;margin-bottom:20px;}
.inv-classic .inv-meta-item{text-align:center;}
.inv-classic .inv-meta-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#999;margin-bottom:3px;}
.inv-classic .inv-meta-val{font-size:13px;font-weight:700;}
/* template: minimal */
.inv-minimal .inv-top{display:flex;justify-content:space-between;align-items:center;padding-bottom:16px;border-bottom:1px solid #eee;margin-bottom:24px;}
.inv-minimal .inv-brand-name{font-size:16px;font-weight:600;letter-spacing:3px;text-transform:uppercase;}
.inv-minimal .inv-brand-logo{height:36px;object-fit:contain;display:block;}
.inv-minimal .inv-title-txt{font-size:28px;font-weight:300;text-transform:uppercase;letter-spacing:6px;color:#999;}
.inv-minimal .inv-meta{font-size:11px;color:#999;text-align:right;line-height:2;}
/* shared invoice styles */
.inv-bill-to{margin-bottom:24px;}
.inv-bill-lbl{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#999;margin-bottom:5px;}
.inv-bill-name{font-size:15px;font-weight:700;margin-bottom:2px;}
.inv-bill-info{font-size:12px;color:#666;line-height:1.9;}
.inv-tbl{width:100%;border-collapse:collapse;margin-bottom:22px;}
.inv-tbl th{text-align:left;font-size:9.5px;text-transform:uppercase;letter-spacing:1.5px;color:#999;padding:8px 10px;border-bottom:2px solid #eee;}
.inv-tbl th:last-child,.inv-tbl td:last-child{text-align:right;}
.inv-tbl td{padding:10px;border-bottom:1px solid #f2f2f2;font-size:13px;}
.inv-totals-wrap{display:flex;justify-content:flex-end;}
.inv-totals{min-width:240px;}
.inv-total-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;color:#555;}
.inv-total-final{display:flex;justify-content:space-between;padding:10px 0;font-size:16px;font-weight:700;border-top:2px solid #1a1e2e;margin-top:4px;}
.inv-note{background:#f8f9fb;border-radius:8px;padding:13px 16px;font-size:12px;color:#666;margin-top:14px;}
.inv-footer-txt{text-align:center;font-size:11px;color:#ccc;margin-top:26px;padding-top:14px;border-top:1px solid #f0f0f0;}

/* ── TOAST ── */
#toast-container{position:fixed;bottom:26px;right:26px;z-index:5000;display:flex;flex-direction:column;gap:7px;}
.toast{background:var(--card2);border:1px solid var(--bdr2);border-radius:12px;padding:12px 18px;
  display:flex;align-items:center;gap:10px;font-size:13px;min-width:240px;
  box-shadow:0 8px 28px rgba(0,0,0,.5);animation:toastIn .3s ease;}
.toast.out{animation:toastOut .3s ease forwards;}
@keyframes toastIn{from{transform:translateX(50px);opacity:0;}}
@keyframes toastOut{to{transform:translateX(50px);opacity:0;}}
.toast-ok{border-left:3px solid var(--green);}
.toast-warn{border-left:3px solid var(--gold2);}
.toast-info{border-left:3px solid var(--blue);}
.toast-err{border-left:3px solid var(--red);}


/* ── EXCHANGE RATE WIDGET ── */
#fx-bar{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,.25);border-radius:8px;padding:5px 12px;flex-shrink:0;}
#fx-bar .fx-label{font-size:10px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:1px;}
#fx-bar .fx-rate{font-size:14px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;}
#fx-bar .fx-sub{font-size:9.5px;color:rgba(255,255,255,.6);}
.fx-spinner{width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── STATS CURRENCY TOGGLE ── */
.stat-curr-toggle{display:flex;gap:4px;background:rgba(255,255,255,.06);border-radius:8px;padding:3px;}
.sct-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.5);transition:all .18s;}
.sct-btn.on{background:rgba(255,255,255,.14);color:#fff;}
/* Dual currency sub-label in stat cards */
.stat-val-dual{font-family:var(--serif);font-size:26px;font-weight:700;color:var(--co-color2);line-height:1;margin-bottom:3px;}
.stat-val-equiv{font-size:12px;color:var(--muted);margin-bottom:5px;font-style:italic;}

/* ── REPORT TOOLBAR ── */
.report-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
.period-select{background:rgba(255,255,255,.04);border:1px solid var(--bdr2);color:var(--txt);padding:8px 12px;border-radius:9px;font-family:var(--font);font-size:13px;outline:none;}
.period-select:focus{border-color:var(--co-colorbdr);}
.period-select option{background:#141c2b;}
.date-range{display:flex;align-items:center;gap:6px;}
.date-range input{background:rgba(255,255,255,.04);border:1px solid var(--bdr2);color:var(--txt);padding:8px 11px;border-radius:9px;font-family:var(--font);font-size:13px;outline:none;}
.date-range input:focus{border-color:var(--co-colorbdr);}
.print-area{background:white;color:#1a1e2e;}
@media print{
  #sidebar,#topbar,#co-header,.report-bar,#toast-container,#modal-root,#bulk-bar,.btn,.tb-actions{display:none!important;}
  #content{padding:0!important;}
  .print-area{box-shadow:none!important;border:none!important;}
}

/* ── EMPTY ── */
.empty{text-align:center;padding:56px 20px;}
.empty-icon{font-size:44px;margin-bottom:10px;opacity:.3;display:block;}
.empty-title{font-family:var(--serif);font-size:17px;color:var(--txt2);margin-bottom:5px;}
.empty-sub{font-size:13px;color:var(--muted);}

/* ── CONFIG ── */
.config-block{background:var(--card);border:1px solid var(--bdr);border-radius:14px;margin-bottom:14px;overflow:hidden;}
.config-block-head{padding:14px 18px;border-bottom:1px solid var(--bdr);font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px;}
.config-block-body{padding:16px 18px;}

/* ── SCHEDULE BADGE ── */
.freq-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600;border:1px solid;}
.freq-monthly{background:var(--bluebg);color:var(--blue);border-color:var(--bluebdr);}
.freq-biweekly{background:var(--purplebg);color:var(--purple);border-color:var(--purplebdr);}
.freq-weekly{background:var(--tealbg);color:var(--teal);border-color:var(--tealbdr);}
.freq-annual{background:var(--goldbg);color:var(--gold2);border-color:var(--goldbdr);}
.freq-none{background:rgba(90,104,128,.1);color:var(--muted);border-color:var(--bdr2);}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const SK = 'ff3_v4';
const DRIVE_TK = 'ff3_drive';
const CURRENCIES = [{code:'USD',symbol:'$',name:'Dólar'},{code:'CRC',symbol:'₡',name:'Colón'},{code:'EUR',symbol:'€',name:'Euro'}];
const PHONE_CODES = [{code:'+506',label:'🇨🇷 +506'},{code:'+1',label:'🇺🇸 +1'},{code:'+34',label:'🇪🇸 +34'},{code:'+52',label:'🇲🇽 +52'},{code:'+57',label:'🇨🇴 +57'},{code:'+503',label:'🇸🇻 +503'},{code:'+502',label:'🇬🇹 +502'},{code:'+507',label:'🇵🇦 +507'}];

// ── EXCHANGE RATE ────────────────────────────────────────────────────
let XR = { buy: 510, sell: 515, date: '', loaded: false };

async function fetchExchangeRate() {
  // Try BCCR indirect via a reliable free CORS endpoint
  try {
    // Use exchangerate-api (free, CORS enabled, updated hourly)
    const res = await fetch('https://open.er-api.com/v6/latest/USD', {cache:'no-cache'});
    if(res.ok) {
      const data = await res.json();
      const rate = data.rates?.CRC;
      if(rate) {
        XR.buy = Math.round(rate * 0.995);   // approx buy slightly lower
        XR.sell = Math.round(rate * 1.005);  // approx sell slightly higher
        XR.date = data.time_last_update_utc?.slice(0,10)||today();
        XR.loaded = true;
        XR.source = 'ExchangeRate-API';
        renderXRBar();
        return;
      }
    }
  } catch(e) {}
  // BCCR fallback via frankfurter
  try {
    const res = await fetch('https://api.frankfurter.app/latest?from=USD&to=CRC');
    if(res.ok) {
      const data = await res.json();
      if(data.rates?.CRC) {
        XR.buy = Math.round(data.rates.CRC * 0.995);
        XR.sell = Math.round(data.rates.CRC * 1.005);
        XR.date = data.date;
        XR.loaded = true;
        XR.source = 'Frankfurter/BCE';
        renderXRBar();
        return;
      }
    }
  } catch(e2) {}
  // Ultimate fallback
  XR.buy = 510; XR.sell = 515; XR.date = today(); XR.loaded = false; XR.source = 'manual';
  renderXRBar();
}

function renderXRBar() {
  // Keep _fxRate in sync with XR so both systems use same rate
  if(XR.sell && XR.sell > 100) {
    _fxRate = XR.sell;
    DB.config.exchangeRate = XR.sell;
    saveDB();
  }
  // xr-bar removed — TC visible in header fx-bar widget
  updateFxWidget();
  const el = document.getElementById('xr-bar');
  if(!el) return;
  const clr = XR.loaded ? 'var(--green)' : 'var(--gold2)';
  el.innerHTML = `
    <span style="font-size:11px;color:var(--muted)">USD/CRC</span>
    <span style="font-weight:700;color:${clr};font-size:12px">Compra: ₡${XR.buy.toLocaleString('es-CR')}</span>
    <span style="color:var(--bdr2)">|</span>
    <span style="font-weight:700;color:${clr};font-size:12px">Venta: ₡${XR.sell.toLocaleString('es-CR')}</span>
    <span style="font-size:10px;color:var(--muted)">${XR.source} · ${XR.date}</span>
    <button onclick="fetchExchangeRate()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:11px;padding:0 2px" title="Actualizar tipo de cambio">⟳</button>
  `;
}

function lightenHex(hex, amt=0.3) {
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,Math.round(r+(255-r)*amt)); g=Math.min(255,Math.round(g+(255-g)*amt)); b=Math.min(255,Math.round(b+(255-b)*amt));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

  document.documentElement.style.setProperty('--co-colorbg', `rgba(${rgb},.09)`);
  document.documentElement.style.setProperty('--co-colorbdr', `rgba(${rgb},.28)`);
}

function calcNextBillingDate(client) {
  const freq = client.billingFrequency || 'none';
  if(freq === 'none') return null;
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth(), d = now.getDate();

  if(freq === 'monthly') {
    const day = parseInt(client.billingDay) || 1;
    let next = new Date(y, m, day);
    if(next <= now) next = new Date(y, m+1, day);
    return next.toISOString().split('T')[0];
  }
  if(freq === 'annual') {
    const day = parseInt(client.billingDay) || 1;
    const month = parseInt(client.billingMonth) || 1;
    let next = new Date(y, month-1, day);
    if(next <= now) next = new Date(y+1, month-1, day);
    return next.toISOString().split('T')[0];
  }
  if(freq === 'biweekly') {
    const ref = client.billingRefDate ? new Date(client.billingRefDate) : new Date(y, m, 1);
    let next = new Date(ref);
    while(next <= now) next.setDate(next.getDate() + 14);
    return next.toISOString().split('T')[0];
  }
  if(freq === 'weekly') {
    const dow = parseInt(client.billingDayOfWeek) || 1;
    let next = new Date(now);
    next.setDate(next.getDate() + ((dow - next.getDay() + 7) % 7 || 7));
    return next.toISOString().split('T')[0];
  }
  return null;
}

function daysUntil(dateStr) {
  if(!dateStr) return null;
  const diff = new Date(dateStr) - new Date(today());
  return Math.ceil(diff / 86400000);
}

function getUpcomingClients(daysAhead=14) {
  return allCl()
    .map(cl => ({...cl, _nextDate: calcNextBillingDate(cl)}))
    .filter(cl => cl._nextDate && daysUntil(cl._nextDate) !== null && daysUntil(cl._nextDate) <= daysAhead)
    .sort((a,b) => a._nextDate.localeCompare(b._nextDate));
}

let currentCoId=null, currentView='dashboard', prevView=null, clientSearch='';
let selectedClients = new Set();

function co() { return DB.companies.find(c=>c.id===currentCoId)||DB.companies[0]||null; }
function allCl() { return DB.clients[currentCoId]||[]; }
function coInvs() { return DB.invoices.filter(i=>i.coId===currentCoId); }

// ═══════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════
function toast(msg,type='ok') {
  const icons={ok:'✅',warn:'⚠️',info:'ℹ️',err:'❌'};
  const el=document.createElement('div');
  el.className=`toast toast-${type}`;
  el.innerHTML=`<span>${icons[type]||'ℹ️'}</span><span>${escH(msg)}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),350);},3500);
}

// ═══════════════════════════════════════════════════════════
// CLOCK
// ═══════════════════════════════════════════════════════════
function startClock() {
  function tick() {
    const now = new Date();
    const date = now.toLocaleDateString('es-CR',{weekday:'short',day:'numeric',month:'short'});
    const time = now.toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const el = document.getElementById('co-header-datetime');
    if(el) el.innerHTML = `<div style="font-weight:600">${time}</div><div style="font-size:10px;opacity:.8">${date}</div>`;
  }
  tick(); setInterval(tick,1000);
}

// ═══════════════════════════════════════════════════════════
// SELECTION (checkboxes)
// ═══════════════════════════════════════════════════════════
function toggleSelect(clId) {
  if(selectedClients.has(clId)) selectedClients.delete(clId);
  else selectedClients.add(clId);
  updateBulkBar();
  // update row highlight
  document.querySelectorAll('[data-clid]').forEach(row => {
    row.classList.toggle('selected-row', selectedClients.has(row.dataset.clid));
  });
}
function selectAll(checked) {
  if(checked) allCl().forEach(cl => selectedClients.add(cl.id));
  else selectedClients.clear();
  updateBulkBar();
  document.querySelectorAll('[data-clid]').forEach(r => r.classList.toggle('selected-row', checked));
  document.querySelectorAll('.cl-cb').forEach(cb => cb.checked = checked);
}
function clearSelection() { selectedClients.clear(); updateBulkBar(); document.querySelectorAll('.cl-cb,#select-all-cb').forEach(cb=>cb.checked=false); document.querySelectorAll('.selected-row').forEach(r=>r.classList.remove('selected-row')); }
function updateBulkBar() {
  const bar = document.getElementById('bulk-bar');
  const cnt = selectedClients.size;
  bar.style.display = cnt > 0 ? 'flex' : 'none';
  document.getElementById('bulk-count-txt').textContent = `${cnt} cliente${cnt!==1?'s':''} seleccionado${cnt!==1?'s':''}`;
}

// ═══════════════════════════════════════════════════════════
// BULK ACTIONS
// ═══════════════════════════════════════════════════════════
function bulkGenerate() {
  const company = co();
  if(!company || !selectedClients.size) return;
  let count = 0;
  selectedClients.forEach(clId => {
    const cl = allCl().find(c=>c.id===clId);
    if(!cl) return;
    const num = String(company.nextInvoice++).padStart(4,'0');
    const id = `INV-${company.invoicePrefix||'INV'}${num}`;
    const rentF = (company.customFields||[]).find(f=>f.key==='rent');
    const aptF  = (company.customFields||[]).find(f=>f.key==='apartment');
    const apt   = aptF ? (cl[aptF.key]||'') : '';
    const curr  = cl.rentCurrency || company.currency || 'USD';
    const sub   = parseFloat(cl[rentF?.key]||0)||0;
    DB.invoices.unshift({
      id, coId:currentCoId, clId:cl.id, clName:cl.name, clEmail:cl.email,
      date:today(), dueDate:today(), status:'pending', currency:curr,
      items:[{desc:`Alquiler${apt?' '+apt:''} – ${monthYearStr()}`,qty:1,price:sub}],
      subtotal:sub, tax:0, total:sub, notes:'', cc:company.ccEmails||[],
      customData:(company.customFields||[]).reduce((a,f)=>({...a,[f.label]:cl[f.key]||''}),{}),
    });
    count++;
  });
  saveDB();
  toast(`📄 ${count} facturas generadas`,'ok');
  clearSelection(); renderView();
}

async function bulkSendSelected() {
  bulkGenerate();
  // send the just-created pending invoices for selected clients
  const pending = DB.invoices.filter(i=>i.coId===currentCoId && i.status==='pending' && selectedClients.has(i.clId));
  if(!pending.length) { toast('No hay facturas pendientes para enviar','warn'); return; }
  for(const inv of pending) { await sendInvoiceEmail(inv.id, true); }
  clearSelection(); renderView();
}

const VIEW_TITLES = {
  dashboard:'Dashboard', upcoming:'Próximos a Cobrar', clients:'Clientes',
  history:'Historial de Facturas', reports:'Reportes', companies:'Mis Empresas', config:'Configuración'

function navigate(view,el) {
  clearSelection();
  prevView=currentView; currentView=view;
  document.querySelectorAll('.sb-item[data-view]').forEach(i=>i.classList.remove('active'));
  (el || document.querySelector(`.sb-item[data-view="${view}"]`))?.classList.add('active');
  document.getElementById('back-btn').style.display = prevView ? 'flex' : 'none';
  renderView();
}
function goBack() { if(prevView){navigate(prevView);prevView=null;} }
function navTo(view) { prevView=null; navigate(view); }

function tbUpcoming(a) {
  a.innerHTML=`<button class="btn btn-co btn-sm" onclick="sendAllUpcoming()">

    Enviar seleccionados
  </button>`;

function renderUpcoming() {
  const upcoming = getUpcomingClients(30);
  const company = co();
  let html = '';
  if(!upcoming.length) { document.getElementById('content').innerHTML=`<div class="empty"><span class="empty-icon">📅</span><div class="empty-title">Sin cobros próximos</div><p class="empty-sub">Configura la frecuencia de facturación de tus clientes para ver cobros próximos.</p></div>`; return; }

  // Group by urgency
  const todayStr = today();
  const urgent = upcoming.filter(c=>c._nextDate <= todayStr);
  const thisWeek = upcoming.filter(c=>c._nextDate > todayStr && daysUntil(c._nextDate) <= 7);
  const later = upcoming.filter(c=>daysUntil(c._nextDate) > 7);

  if(urgent.length) html+=`<div style="margin-bottom:18px"><div style="font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--red);font-weight:700;margin-bottom:10px">⚠ Por enviar hoy</div><div class="upcoming-grid">${urgent.map(cl=>upcomingCard(cl,company)).join('')}</div></div>`;
  if(thisWeek.length) html+=`<div style="margin-bottom:18px"><div style="font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--gold2);font-weight:700;margin-bottom:10px">Esta semana</div><div class="upcoming-grid">${thisWeek.map(cl=>upcomingCard(cl,company)).join('')}</div></div>`;
  if(later.length) html+=`<div style="margin-bottom:18px"><div style="font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:700;margin-bottom:10px">Próximamente</div><div class="upcoming-grid">${later.map(cl=>upcomingCard(cl,company)).join('')}</div></div>`;

  document.getElementById('content').innerHTML = html;
}
function upcomingCard(cl, company) {
  const days = daysUntil(cl._nextDate);
  const rentF = (company?.customFields||[]).find(f=>f.key==='rent');
  const amount = rentF ? fmtM(cl[rentF.key]||0, cl.rentCurrency||company.currency) : '—';
  const urgency = days<=0 ? 'urgent' : days<=1 ? 'today' : '';
  const sel = selectedClients.has(cl.id) ? 'selected-uc' : '';
  const daysLabel = days<=0 ? '¡Hoy!' : days===1 ? 'Mañana' : `En ${days} días`;
  return `<div class="upcoming-card ${urgency} ${sel}" onclick="toggleSelect('${cl.id}');this.classList.toggle('selected-uc')" data-clid="${cl.id}">
    <input type="checkbox" class="cb cl-cb" ${selectedClients.has(cl.id)?'checked':''} style="flex-shrink:0" onclick="event.stopPropagation();toggleSelect('${cl.id}')">
    <div class="uc-avatar">${cl.name.charAt(0)}</div>
    <div style="flex:1;min-width:0">
      <div class="uc-name">${escH(cl.name)}</div>
      <div class="uc-date">${escH(cl._nextDate)} · <span class="freq-pill ${FREQ_COLORS[cl.billingFrequency]||'freq-none'}">${FREQ_LABELS[cl.billingFrequency]||'—'}</span></div>
    </div>
    <div>
      <div class="uc-amount">${amount}</div>
      <div class="uc-days" style="color:${days<=0?'var(--red)':days<=3?'var(--gold2)':'var(--muted)'}">${daysLabel}</div>
    </div>
  </div>`;
}
function sendAllUpcoming() {
  if(!selectedClients.size) { toast('Selecciona clientes primero','warn'); return; }
  bulkSendSelected();
}

// REPORTS
function renderReports() {
  const invs=coInvs();
  const paid=invs.filter(i=>i.status==='paid');
  const sent=invs.filter(i=>i.status==='sent');
  const pending=invs.filter(i=>i.status==='pending');
  const total_rev=paid.reduce((a,b)=>a+b.total,0);
  const company=co();
  const curr=company?.currency||'USD';

  // Last 6 months bar chart
  const months=[];
  for(let i=5;i>=0;i--){
    const d=new Date(); d.setMonth(d.getMonth()-i);
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label=d.toLocaleDateString('es-CR',{month:'short'});
    const rev=paid.filter(inv=>inv.date?.startsWith(key)).reduce((a,b)=>a+b.total,0);
    months.push({label,rev,key});
  }
  const maxRev=Math.max(...months.map(m=>m.rev),1);

  const bars=months.map(m=>`<div class="bar-wrap">
    <div class="bar-val">${m.rev>0?csym(curr)+Math.round(m.rev).toLocaleString('es-CR'):''}</div>
    <div class="bar" style="height:${Math.max(4,(m.rev/maxRev)*72)}px"></div>
    <div class="bar-lbl">${m.label}</div>
  </div>`).join('');

  // Frequency breakdown
  const freqCount={monthly:0,biweekly:0,weekly:0,annual:0,none:0};
  allCl().forEach(cl=>{ const f=cl.billingFrequency||'none'; freqCount[f]=(freqCount[f]||0)+1; });

  document.getElementById('content').innerHTML=`
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-lbl">Ingresos totales</div><div class="stat-val">${fmtM(total_rev,curr)}</div><div class="stat-sub">${paid.length} facturas pagadas</div><div class="stat-icon">💵</div></div>
      <div class="stat-card"><div class="stat-lbl">Facturas enviadas</div><div class="stat-val" style="color:var(--blue)">${sent.length+paid.length}</div><div class="stat-sub">Total histórico</div><div class="stat-icon" style="background:var(--bluebg);border-color:var(--bluebdr)">📤</div></div>
      <div class="stat-card"><div class="stat-lbl">Pendientes</div><div class="stat-val" style="color:var(--gold2)">${pending.length}</div><div class="stat-sub">Sin enviar</div><div class="stat-icon" style="background:var(--goldbg);border-color:var(--goldbdr)">📋</div></div>
      <div class="stat-card"><div class="stat-lbl">Ticket promedio</div><div class="stat-val">${paid.length?fmtM(total_rev/paid.length,curr):'—'}</div><div class="stat-sub">Por factura pagada</div><div class="stat-icon">📊</div></div>
    </div>
    <div class="report-grid">
      <div class="mini-chart">
        <div class="mini-chart-title">Ingresos por mes</div>
        <div class="bar-chart">${bars}</div>
      </div>
      <div class="mini-chart">
        <div class="mini-chart-title">Distribución de frecuencias</div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">
          ${Object.entries(freqCount).filter(([,v])=>v>0).map(([k,v])=>`
            <div style="display:flex;align-items:center;gap:10px">
              <span class="freq-pill ${FREQ_COLORS[k]}" style="min-width:90px;justify-content:center">${FREQ_LABELS[k]}</span>
              <div style="flex:1;background:var(--bdr2);border-radius:4px;height:8px;overflow:hidden">
                <div style="height:100%;border-radius:4px;background:var(--co-color);width:${(v/allCl().length*100).toFixed(0)}%;transition:width .6s"></div>
              </div>
              <span style="font-size:12px;color:var(--muted);min-width:24px;text-align:right">${v}</span>
            </div>`).join('')}
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><span class="card-head-title">Todas las Facturas</span>
        <div style="display:flex;gap:8px">
          <span class="badge badge-green">Pagadas: ${paid.length}</span>
          <span class="badge badge-blue">Enviadas: ${sent.length}</span>
          <span class="badge badge-gold">Pendientes: ${pending.length}</span>
        </div>
      </div>
      <div class="table-wrap"><table><thead><tr><th>N°</th><th>Cliente</th><th>Fecha</th><th>Total</th><th>Estado</th></tr></thead><tbody>
        ${invs.map(inv=>`<tr><td class="td-id">${escH(inv.id)}</td><td>${escH(inv.clName)}</td><td class="td-muted">${escH(inv.date)}</td><td class="td-amount">${fmtM(inv.total,inv.currency)}</td><td>${statusBadge(inv)}</td></tr>`).join('')}
        ${!invs.length?`<tr><td colspan="5"><div class="empty"><span class="empty-icon">📊</span><div class="empty-title">Sin datos</div></div></td></tr>`:''}
      </tbody></table></div>
    </div>`;
}

        ${c.taxId?`<div>CJ: ${escH(c.taxId)}</div>`:''}

}

function buildInvoiceHTML(inv, company) {
  const curr=inv.currency||company.currency||'USD';

  const color=company.primaryColor||company.color||'#c9943a';
  const logoHtml=company.logo?`<img src="${company.logo}" style="height:52px;object-fit:contain;display:block;margin-bottom:8px" alt="">` : '';

  const totalsHtml=`<div style="display:flex;justify-content:flex-end"><div style="min-width:240px">
    <div style="display:flex;justify-content:space-between;padding:5px 0;font-size:13px;color:#555"><span>Subtotal</span><span>${fmtM(sub,curr)}</span></div>
    ${taxA>0?`<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:13px;color:#555"><span>IVA (13%)</span><span>${fmtM(taxA,curr)}</span></div>`:''}
    <div style="display:flex;justify-content:space-between;padding:10px 0;font-size:17px;font-weight:700;border-top:2px solid #1a1e2e;margin-top:4px;color:${color}"><span>TOTAL</span><span>${fmtM(inv.total,curr)}</span></div>

    +(company.bankInfo?`<div style="background:#f8f9fb;border-radius:8px;padding:13px 16px;font-size:12px;color:#666;margin-top:8px"><strong>Pago:</strong> ${escH(company.bankInfo)}</div>`:'')

  const billTo=`<div style="margin-bottom:24px"><div style="font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#999;margin-bottom:5px">Facturado a</div>
    <div style="font-size:15px;font-weight:700;margin-bottom:2px">${escH(inv.clName)}</div>
    <div style="font-size:12px;color:#666">${escH(inv.clEmail)}</div>
    ${inv.customData?Object.entries(inv.customData).filter(([,v])=>v).map(([k,v])=>`<div style="font-size:12px;color:#666">${escH(k)}: ${escH(v)}</div>`).join(''):''}
  </div>`;
  const tblHtml=`<table style="width:100%;border-collapse:collapse;margin-bottom:22px"><thead><tr style="border-bottom:2px solid #eee"><th style="text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#999;padding:8px 10px">Descripción</th><th style="text-align:center;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#999;padding:8px 10px">Cant.</th><th style="text-align:right;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#999;padding:8px 10px">Precio</th><th style="text-align:right;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#999;padding:8px 10px">Total</th></tr></thead><tbody>${itemRows}</tbody></table>`;
  const condPagoLine = (inv.condVenta||inv.formaPago) ? `<div style="background:#f0f4ff;border-radius:8px;padding:10px 14px;font-size:12px;color:#444;margin-top:10px;display:flex;gap:20px">

      <div style="font-size:12px;color:#666">${escH(company.address||'')} · ${escH(company.email||'')}</div>
    </div>
    <div style="display:flex;justify-content:space-between;background:#f8f9fb;padding:12px 16px;border-radius:8px;margin-bottom:22px">

      <div style="text-align:center"><div style="font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#999;margin-bottom:3px">Fecha</div><div style="font-size:13px;font-weight:700">${escH(inv.date)}</div></div>
      <div style="text-align:center"><div style="font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#999;margin-bottom:3px">Vence</div><div style="font-size:13px;font-weight:700">${escH(inv.dueDate)}</div></div>
      <div style="text-align:center"><div style="font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#999;margin-bottom:3px">Total</div><div style="font-size:13px;font-weight:700;color:${color}">${fmtM(inv.total,curr)}</div></div>
    </div>
    ${billTo}${tblHtml}${totalsHtml}${condPagoLine}${notesHtml}${footer}</div>`;

  // minimal
  return `<div style="background:white;color:#1a1e2e;padding:50px;font-family:'DM Sans',Arial,sans-serif;font-size:13px;max-width:800px">
    <div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:16px;border-bottom:1px solid #eee;margin-bottom:24px">
      <div>${logoHtml||`<div style="font-size:15px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:${color}">${escH(company.name)}</div>`}</div>
      <div style="text-align:right"><div style="font-size:28px;font-weight:300;text-transform:uppercase;letter-spacing:6px;color:#bbb">FACTURA</div><div style="font-size:11px;color:#999;line-height:2">${escH(inv.id)} · ${escH(inv.date)} · Vence: ${escH(inv.dueDate)}</div></div>
    </div>
    ${billTo}${tblHtml}${totalsHtml}${condPagoLine}${notesHtml}${footer}</div>`;
}

function statusBadge(inv) {
  if(isOD(inv)) return `<span class="badge badge-red">⚠ Vencida</span>`;
  const m={pending:['badge-gold','Pendiente'],sent:['badge-blue','Enviada'],paid:['badge-green','Pagada']};
  const [c,l]=m[inv.status]||['badge-gold','—'];
  return `<span class="badge ${c}">${l}</span>`;
}
function rowActions(inv,full=false) {
  let b='';
  if(inv.status==='pending') b+=`<button class="btn btn-co btn-xs" onclick="sendInvoiceEmail('${inv.id}')"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg> Enviar</button>`;
  if(inv.status==='sent'||isOD(inv)) b+=`<button class="btn btn-outline btn-xs" onclick="markPaid('${inv.id}')">✓ Cobrada</button>`;
  if(full) b+=`<button class="btn btn-ghost btn-xs" title="Duplicar" onclick="dupInvoice('${inv.id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>`;
  b+=`<button class="btn btn-ghost btn-xs" onclick="previewInvoice('${inv.id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>`;
  if(full) b+=`<button class="btn btn-ghost btn-xs" title="Eliminar" style="color:var(--red)" onclick="deleteInvoice('${inv.id}')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>`;
  b+=`<button class="btn btn-ghost btn-xs" style="color:var(--red)" title="Eliminar factura" onclick="confirmDel('esta factura',()=>deleteInvoice('${inv.id}'))"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>`;
  return `<div style="display:flex;gap:5px;align-items:center">${b}</div>`;
}

function deleteInvoice(id) {
  DB.invoices = DB.invoices.filter(i=>i.id!==id);
  saveDB(); toast('Factura eliminada','warn'); renderView();
}

// ═══════════════════════════════════════════════════════════
// INVOICE CRUD
// ═══════════════════════════════════════════════════════════
function createInvoice(data) {
  const company=co();
  const num=String(company.nextInvoice).padStart(4,'0');
  const id=`INV-${company.invoicePrefix||'INV'}${num}`;
  DB.invoices.unshift({...data,id,coId:currentCoId});
  company.nextInvoice++;
  saveDB(); toast('Factura creada ✓'); closeModal(); renderView();
}
function markPaid(id) { const i=DB.invoices.find(x=>x.id===id); if(i){i.status='paid';saveDB();toast('✅ Marcada como pagada');renderView();} }
function dupInvoice(id) {
  const orig=DB.invoices.find(i=>i.id===id); const company=co(); if(!orig||!company) return;
  const num=String(company.nextInvoice++).padStart(4,'0');
  DB.invoices.unshift({...orig,id:`INV-${company.invoicePrefix||'INV'}${num}`,date:today(),dueDate:today(),status:'pending'});
  saveDB(); toast('📋 Factura duplicada'); renderView();
}
function bulkMonthly() {
  const company=co();
  const withRent=allCl().filter(c=>c.rent&&parseFloat(c.rent)>0);
  if(!withRent.length){toast('Sin clientes con renta','warn');return;}
  withRent.forEach(cl=>{
    const num=String(company.nextInvoice++).padStart(4,'0');
    const id=`INV-${company.invoicePrefix||'INV'}${num}`;
    const rentF=(company.customFields||[]).find(f=>f.key==='rent');
    const aptF=(company.customFields||[]).find(f=>f.key==='apartment');
    const apt=aptF?(cl[aptF.key]||''):'';
    const curr=cl.rentCurrency||company.currency||'USD';
    const sub=parseFloat(cl[rentF?.key]||0)||0;
    DB.invoices.unshift({id,coId:currentCoId,clId:cl.id,clName:cl.name,clEmail:cl.email,date:today(),dueDate:today(),status:'pending',currency:curr,items:[{desc:`Alquiler${apt?' '+apt:''} – ${monthYearStr()}`,qty:1,price:sub}],subtotal:sub,tax:0,total:sub,notes:'',cc:company.ccEmails||[],customData:(company.customFields||[]).reduce((a,f)=>({...a,[f.label]:cl[f.key]||''}),{})});
  });
  saveDB(); toast(`⚡ ${withRent.length} facturas generadas`); renderView();
}

function previewInvoice(invId) {
  const inv=DB.invoices.find(i=>i.id===invId);
  const company=DB.companies.find(c=>c.id===inv?.coId);
  if(!inv||!company) return;
  showModal('modal-xl',`
    <div class="modal-head">
      <h3 style="font-family:var(--mono);font-size:14px;color:var(--co-color2)">${escH(inv.id)}</h3>
      <div style="display:flex;gap:8px;align-items:center">
        ${inv.status==='pending'?`<button class="btn btn-co btn-sm" onclick="sendInvoiceEmail('${inv.id}');closeModal()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg> Enviar</button>`:''}
        ${(inv.status==='sent'||isOD(inv))?`<button class="btn btn-outline btn-sm" onclick="markPaid('${inv.id}');closeModal()">✓ Pagada</button>`:''}
        <button class="btn btn-red btn-sm" onclick="deleteInvoice('${inv.id}');closeModal()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
        <button class="btn btn-ghost" onclick="closeModal()">✕</button>
      </div>
    </div>
    <div class="modal-body">${buildInvoiceHTML(inv,company)}</div>`);
}

// ═══════════════════════════════════════════════════════════
// CLIENT CRUD
// ═══════════════════════════════════════════════════════════
function saveClient(data) {
  if(!DB.clients[currentCoId]) DB.clients[currentCoId]=[];
  const list=DB.clients[currentCoId];
  if(data.id){const i=list.findIndex(x=>x.id===data.id);if(i>=0)list[i]=data;}
  else list.push({...data,id:'cl'+uid()});
  saveDB(); toast(data.id?'Cliente actualizado ✓':'Cliente agregado ✓'); closeModal(); renderView();
}
function delClient(id) {
  DB.clients[currentCoId]=(DB.clients[currentCoId]||[]).filter(x=>x.id!==id);

async function sendInvoiceEmail(invId, silent=false) {
  const inv=DB.invoices.find(i=>i.id===invId);
  const company=DB.companies.find(c=>c.id===inv?.coId);
  if(!inv||!company) return;
  const cfg=DB.config;
  if(!cfg.emailjsService||!cfg.emailjsTemplate||!cfg.emailjsPublic){
    if(!silent) toast('Configura EmailJS primero','warn'); return;
  }
  if(!silent) toast('Enviando…','info');
  try {
    if(typeof emailjs!=='undefined') emailjs.init(cfg.emailjsPublic);
    else{if(!silent)toast('EmailJS no disponible','err');return;}
    await emailjs.send(cfg.emailjsService,cfg.emailjsTemplate,{
      to_email:inv.clEmail, to_name:inv.clName, company_name:company.name,
      invoice_id:inv.id, invoice_date:inv.date, due_date:inv.dueDate,
      total:fmtM(inv.total,inv.currency), invoice_html:buildInvoiceHTML(inv,company),
      subject:`Factura ${inv.id} — ${company.name}`,
    });
    inv.status='sent'; saveDB();
    if(!silent) toast(`📧 Enviada a ${inv.clEmail}`);
    renderView();
  } catch(e) { if(!silent) toast('Error: '+(e.text||e.message||'desconocido'),'err'); }
}
async function testEmail(){
  const cfg=DB.config;
  if(!cfg.emailjsService||!cfg.emailjsTemplate||!cfg.emailjsPublic){toast('Completa la configuración primero','warn');return;}
  const addr=prompt('Correo de prueba:');if(!addr)return;

  }catch(e){toast('Error: '+(e.text||e.message),'err');}
}

// DRIVE
function driveAuth(){
  const client=google.accounts.oauth2.initTokenClient({client_id:'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com',scope:'https://www.googleapis.com/auth/drive.file',
    callback:(resp)=>{if(resp.error){toast('Error Drive: '+resp.error,'err');return;}driveToken=resp.access_token;localStorage.setItem(DRIVE_TK,driveToken);toast('✅ Google Drive conectado');updateCoHeader();renderView();}});
  client.requestAccessToken();
}
function driveDisconnect(){driveToken=null;localStorage.removeItem(DRIVE_TK);toast('Drive desconectado','warn');renderConfig();}
async function backupNow(){
  const token=driveToken||localStorage.getItem(DRIVE_TK);
  if(!token){toast('Conecta Drive primero','warn');return;}
  toast('Respaldando…','info');
  try{
    const data=JSON.stringify(DB,null,2);
    const blob=new Blob([data],{type:'application/json'});
    const name=`FactuFlow_${today()}.json`;
    const meta=JSON.stringify({name,mimeType:'application/json',parents:['appDataFolder']});
    const form=new FormData();form.append('metadata',new Blob([meta],{type:'application/json'}));form.append('file',blob);
    const res=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:`Bearer ${token}`},body:form});
    if(!res.ok) throw new Error('HTTP '+res.status);
    DB.config.lastBackup=new Date().toISOString();saveDB();
    toast('☁️ Respaldo guardado ✓');updateCoHeader();
  }catch(e){toast('Error: '+e.message,'err');}
}
async function restoreFromDrive(){
  const token=driveToken||localStorage.getItem(DRIVE_TK);if(!token){toast('Conecta Drive primero','warn');return;}
  try{
    const listRes=await fetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name+contains+'FactuFlow'&orderBy=createdTime+desc&pageSize=5`,{headers:{Authorization:`Bearer ${token}`}});
    const list=await listRes.json();
    if(!list.files?.length){toast('Sin respaldos en Drive','warn');return;}
    const latest=list.files[0];
    confirmDel(`restaurar "${latest.name}"`,async()=>{
      const fr=await fetch(`https://www.googleapis.com/drive/v3/files/${latest.id}?alt=media`,{headers:{Authorization:`Bearer ${token}`}});
      DB=await fr.json();saveDB();currentCoId=DB.companies[0]?.id||null;
      toast('✅ Datos restaurados');renderView();updateCoHeader();
    },'Restaurar');
  }catch(e){toast('Error: '+e.message,'err');}
}
function exportFullBackup(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(DB,null,2)],{type:'application/json'}));a.download=`FactuFlow_${today()}.json`;a.click();toast('Backup exportado ✓');}
function importFullBackup(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=(ev)=>{try{DB=JSON.parse(ev.target.result);saveDB();currentCoId=DB.companies[0]?.id||null;renderView();updateCoHeader();toast('✅ Datos importados');}catch(err){toast('Archivo inválido','err');}};r.readAsText(f);e.target.value='';}

function exportClients(){const cls=allCl();if(!cls.length){toast('Sin clientes','warn');return;}const keys=[...new Set(cls.flatMap(Object.keys))];const csv=[keys.join(','),...cls.map(r=>keys.map(k=>`"${(r[k]||'').toString().replace(/"/g,'""')}"`).join(','))].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`clientes_${co()?.shortName||'export'}.csv`;a.click();toast('Exportado ✓');}
function importClients(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=(ev)=>{const lines=ev.target.result.trim().split('\n');const hdrs=lines[0].split(',').map(h=>h.replace(/"/g,'').trim());const imp=lines.slice(1).map(line=>{const vals=line.match(/(".*?"|[^,]+)/g)||[];const obj={id:'cl'+uid()};hdrs.forEach((h,i)=>{obj[h]=(vals[i]||'').replace(/"/g,'');});return obj;});if(!DB.clients[currentCoId])DB.clients[currentCoId]=[];DB.clients[currentCoId].push(...imp);saveDB();toast(`${imp.length} importados ✓`);renderView();};r.readAsText(f);e.target.value='';}

// Tags
let _tags={};
function initTags(k,init=[]){_tags[k]=[...init];renderTags(k);}
function addTag(k,v){v=v.trim();if(v&&!_tags[k].includes(v)){_tags[k].push(v);renderTags(k);}}
function removeTag(k,v){_tags[k]=_tags[k].filter(x=>x!==v);renderTags(k);}
function renderTags(k){const w=document.getElementById('tags-'+k);if(!w)return;const cur=w.querySelector('.tag-input')?.value||'';w.innerHTML=_tags[k].map(t=>`<span class="tag">${escH(t)}<button onclick="removeTag('${k}','${escH(t)}')">×</button></span>`).join('')+`<input class="tag-input" placeholder="email@..." value="${escH(cur)}" onkeydown="if(event.key==='Enter'||event.key===','||event.key===' '){event.preventDefault();addTag('${k}',this.value);this.value=''}" onblur="addTag('${k}',this.value);this.value=''">`;}

// Phone helpers
function phoneVal(ccId,numId){return (document.getElementById(ccId)?.value||'+506')+' '+(document.getElementById(numId)?.value||'');}
function fmtCRPhone(raw){const d=raw.replace(/\D/g,'').slice(0,8);return d.length>4?d.slice(0,4)+'-'+d.slice(4):d;}
function parsePhone(v){for(const cc of PHONE_CODES){if(v.startsWith(cc.code)){return{code:cc.code,num:v.slice(cc.code.length).trim()};}}return{code:'+506',num:v};}

function openModal(name,data){
  switch(name){
    case 'coPicker':  showCoPicker(); break;
    case 'coModal':   showCoModal(data||{}); break;
    case 'clModal':   showClModal(data||{}); break;
    case 'invModal':  showInvModal(data||{}); break;
  }
}

function renderCFRows(cfs){
  if(!cfs.length) return '';

  return header+cfs.map((cf,i)=>`<div style="display:grid;grid-template-columns:1fr 1fr 100px 30px;gap:7px;align-items:center;margin-bottom:7px">
    <input style="background:rgba(255,255,255,.04);border:1px solid var(--bdr2);color:var(--txt);padding:8px 10px;border-radius:9px;font-family:var(--font);font-size:13px;outline:none" placeholder="Etiqueta" value="${escH(cf.label)}" oninput="_coEdit.customFields[${i}].label=this.value">
    <input style="background:rgba(255,255,255,.04);border:1px solid var(--bdr2);color:var(--txt);padding:8px 10px;border-radius:9px;font-family:var(--font);font-size:13px;outline:none" placeholder="clave-interna" value="${escH(cf.key)}" oninput="_coEdit.customFields[${i}].key=this.value.replace(/\\s/g,'')">
    <select style="background:rgba(255,255,255,.04);border:1px solid var(--bdr2);color:var(--txt);padding:8px 7px;border-radius:9px;font-family:var(--font);font-size:12px;outline:none" onchange="_coEdit.customFields[${i}].type=this.value">
      <option value="text" ${cf.type==='text'?'selected':''}>Texto</option>
      <option value="money" ${cf.type==='money'?'selected':''}>Dinero 💰</option>
      <option value="number" ${cf.type==='number'?'selected':''}>Número</option>
    </select>
    <button class="btn btn-ghost btn-xs" style="color:var(--red);padding:5px" onclick="removeCF(${i})"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
  </div>`).join('');
}

function switchTab(grp,pane,btn){
  ['info','invoice','design','fields'].forEach(p=>{const el=document.getElementById(`${grp}-pane-${p}`);if(el)el.style.display='none';});
  document.getElementById(`${grp}-pane-${pane}`).style.display='';
  document.querySelectorAll('.tabs .tab-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  if(pane==='design') setTimeout(renderTmplPreview,50);
}

function updateBillingUI(){
  const freq=document.getElementById('cl-freq')?.value||'none';
  const data=window._clEditData||{};
  const extra=document.getElementById('billing-extra');
  const cal=document.getElementById('billing-calendar');
  if(!extra) return;
  if(freq==='monthly'){
    extra.innerHTML=`<div class="field"><label>Día del mes</label><select id="cl-bday">${Array.from({length:28},(_,i)=>`<option value="${i+1}" ${(data.billingDay||1)===(i+1)?'selected':''}>${i+1}°</option>`).join('')}</select></div>`;
    cal.innerHTML=`<p style="font-size:11.5px;color:var(--muted)">Se facturará el día <strong id="day-preview" style="color:var(--co-color2)">${data.billingDay||1}</strong> de cada mes.</p>`;
    document.getElementById('cl-bday').addEventListener('change',e=>{document.getElementById('day-preview').textContent=e.target.value;});
  } else if(freq==='weekly'){
    const dOpts=DAYS_ES.map((d,i)=>`<option value="${i}" ${(data.billingDayOfWeek||1)===i?'selected':''}>${d}</option>`).join('');
    extra.innerHTML=`<div class="field"><label>Día de la semana</label><select id="cl-bdow">${dOpts}</select></div>`;
    cal.innerHTML=`<p style="font-size:11.5px;color:var(--muted)">Se facturará cada semana el día seleccionado.</p>`;
  } else if(freq==='biweekly'){
    extra.innerHTML=`<div class="field"><label>Fecha de referencia</label><input type="date" id="cl-bref" value="${data.billingRefDate||today()}"></div>`;
    cal.innerHTML=`<p style="font-size:11.5px;color:var(--muted)">Se facturará cada 14 días desde la fecha de referencia.</p>`;
  } else if(freq==='annual'){
    const mOpts=MONTHS_ES.map((m,i)=>`<option value="${i+1}" ${(data.billingMonth||1)===(i+1)?'selected':''}>${m}</option>`).join('');
    extra.innerHTML=`<div class="form-grid g2"><div class="field"><label>Mes</label><select id="cl-bmonth">${mOpts}</select></div><div class="field"><label>Día</label><select id="cl-bday">${Array.from({length:28},(_,i)=>`<option value="${i+1}" ${(data.billingDay||1)===(i+1)?'selected':''}>${i+1}°</option>`).join('')}</select></div></div>`;
    cal.innerHTML=`<p style="font-size:11.5px;color:var(--muted)">Se facturará una vez al año en la fecha indicada.</p>`;
  } else {
    extra.innerHTML='';
    cal.innerHTML='';
  }
}
function submitClModal(existingId){
  const name=document.getElementById('cl-name')?.value.trim();
  const email=document.getElementById('cl-email')?.value.trim();
  if(!name||!email){toast('Nombre y email requeridos','warn');return;}
  const company=co();
  const freq=document.getElementById('cl-freq')?.value||'none';
  const obj={name,email,phone:phoneVal('cl-ph-cc','cl-ph-num'),id_number:document.getElementById('cl-id')?.value||'',notes:document.getElementById('cl-notes')?.value||'',billingFrequency:freq,condVenta:document.getElementById('cl-condventa')?.value||'contado',formaPago:document.getElementById('cl-formapago')?.value||'sinpe'};
  if(freq==='monthly')obj.billingDay=parseInt(document.getElementById('cl-bday')?.value)||1;
  if(freq==='weekly')obj.billingDayOfWeek=parseInt(document.getElementById('cl-bdow')?.value)||1;
  if(freq==='biweekly')obj.billingRefDate=document.getElementById('cl-bref')?.value||today();
  if(freq==='annual'){obj.billingMonth=parseInt(document.getElementById('cl-bmonth')?.value)||1;obj.billingDay=parseInt(document.getElementById('cl-bday')?.value)||1;}
  if(existingId) obj.id=existingId;
  (company?.customFields||[]).forEach(cf=>{obj[cf.key]=document.getElementById('cf-'+cf.key)?.value||'';if(cf.type==='money')obj[cf.key+'Currency']=document.getElementById('cf-'+cf.key+'-curr')?.value||'USD';});
  saveClient(obj);
}

function autoFill(cl){
  const company=co();
  const rentF=(company.customFields||[]).find(f=>f.key==='rent');
  const aptF=(company.customFields||[]).find(f=>f.key==='apartment');
  if(rentF&&cl[rentF.key]){
    const apt=aptF?(cl[aptF.key]||''):'';
    _invItems=[{desc:`Alquiler${apt?' '+apt:''} – ${monthYearStr()}`,qty:1,price:parseFloat(cl[rentF.key])||0}];
    if(cl.rentCurrency) _invCurr=cl.rentCurrency;
  }
}
function onClChange(id){
  const cl=allCl().find(c=>c.id===id);
  if(!cl) return;
  autoFill(cl);
  const s=document.getElementById('inv-curr');if(s)s.value=_invCurr;
  // Set condVenta and formaPago from client
  const cv=document.getElementById('inv-condventa');if(cv) cv.value=cl.condVenta||'contado';
  const fp=document.getElementById('inv-formapago');if(fp) fp.value=cl.formaPago||'sinpe';
  // Set notes if empty
  const nt=document.getElementById('inv-notes');
  const company=co();
  if(nt && !nt.value) nt.value=company?.invoiceNotes||'';
  renderLines();
  renderXRPreview();
}
function renderXRPreview(){
  const el=document.getElementById('inv-xr-preview');if(!el)return;
  const sub=_invItems.reduce((a,it)=>a+(it.qty||1)*(it.price||0),0);
  if(!sub){el.innerHTML='';return;}
  if(_invCurr==='USD'){
    el.innerHTML=`💱 Equivale a <strong>₡${usdToCrc(sub).toLocaleString('es-CR')}</strong> CRC al tipo de cambio de venta ₡${XR.sell.toLocaleString('es-CR')}`;
  } else if(_invCurr==='CRC'){
    el.innerHTML=`💱 Equivale a <strong>$${crcToUsd(sub)}</strong> USD al tipo de cambio de venta ₡${XR.sell.toLocaleString('es-CR')}`;
  } else {el.innerHTML='';}
}
function onInvCurrChange(newCurr) {
  if(!newCurr || newCurr === _invCurr) { _invCurr = newCurr; renderLines(); updateFxInvoice(); return; }
  const oldCurr = _invCurr;
  _invCurr = newCurr;
  // Auto-convert all line item prices
  if((oldCurr==='USD'&&newCurr==='CRC') || (oldCurr==='CRC'&&newCurr==='USD')) {
    _invItems = _invItems.map(it => {
      const oldP = parseFloat(it.price)||0;
      if(!oldP) return it;
      let newP;
      if(oldCurr==='USD' && newCurr==='CRC') newP = Math.round(usdToCrc(oldP));
      else newP = parseFloat(crcToUsd(oldP).toFixed(2));
      return {...it, price: newP};
    });
  }
  // Update the select display value
  const sel = document.getElementById('inv-curr');
  if(sel) sel.value = newCurr;
  renderLines();
  updateFxInvoice();
}

function renderLines(){
  setTimeout(updateFxInvoice,50);
  const w=document.getElementById('inv-lines');if(!w)return;
  w.innerHTML=_invItems.map((it,i)=>`<div class="inv-line-row">
    <input placeholder="Descripción" value="${escH(it.desc)}" oninput="_invItems[${i}].desc=this.value">
    <input type="number" min="1" value="${it.qty}" placeholder="1" oninput="_invItems[${i}].qty=parseFloat(this.value)||1;renderTotals()">
    <input type="number" min="0" step="0.01" value="${it.price}" placeholder="0.00" oninput="_invItems[${i}].price=parseFloat(this.value)||0;renderTotals()">
    <span class="line-total">${fmtM((it.qty||1)*(it.price||0),_invCurr)}</span>
    <button class="btn btn-ghost btn-xs" style="color:var(--red)" onclick="removeLine(${i})"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
  </div>`).join('');
  renderTotals();
}
function renderTotals(){
  const sub=_invItems.reduce((a,it)=>a+(it.qty||1)*(it.price||0),0);
  const taxA=_invTax?sub*0.13:0;const total=sub+taxA;
  const w=document.getElementById('inv-totals');if(!w)return;
  w.innerHTML=`<div style="min-width:240px;font-size:13px">
    <div style="display:flex;justify-content:space-between;padding:5px 0;color:var(--txt2)"><span>Subtotal</span><span style="font-weight:600">${fmtM(sub,_invCurr)}</span></div>
    <div style="display:flex;justify-content:space-between;padding:5px 0;color:var(--txt2);align-items:center;gap:12px"><label style="display:flex;align-items:center;gap:7px;cursor:pointer"><input type="checkbox" ${_invTax?'checked':''} onchange="_invTax=this.checked;renderTotals()">IVA 13%</label><span>${fmtM(taxA,_invCurr)}</span></div>
    <div style="display:flex;justify-content:space-between;padding:10px 0;font-size:16px;font-weight:700;border-top:1px solid var(--bdr);color:var(--co-color2)"><span>TOTAL</span><span>${fmtM(total,_invCurr)}</span></div>
  </div>`;
}
function addLine(){_invItems.push({desc:'',qty:1,price:0});renderLines();renderXRPreview();}
function removeLine(i){_invItems.splice(i,1);renderLines();}
function switchInvTab(pane,btn){
  document.getElementById('inv-pane-form').style.display=pane==='form'?'':'none';
  document.getElementById('inv-pane-preview').style.display=pane==='preview'?'':'none';
  document.querySelectorAll('.modal .tab-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');
  if(pane==='preview'){document.getElementById('inv-prev-content').innerHTML=buildInvoiceHTML(buildCurrentInv('preview'),co());}

// ══════════════════════════════════════════════════════
// EXCHANGE RATE — BCCR via open.er-api.com fallback
// ══════════════════════════════════════════════════════
let _fxRate = 520; // default fallback CRC per USD
let _fxUpdated = null;

async function fetchExchangeRate() {
  const el = document.getElementById('fx-rate-val');
  const upd = document.getElementById('fx-rate-updated');
  if(el) el.innerHTML = '<div class="fx-spinner"></div>';
  try {
    // Try open.er-api (free, no token)
    const res = await fetch('https://open.er-api.com/v6/latest/USD');
    const data = await res.json();
    if(data && data.rates && data.rates.CRC) {
      _fxRate = parseFloat(data.rates.CRC.toFixed(2));
      _fxUpdated = new Date().toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit'});
      DB.config.exchangeRate = _fxRate;
      DB.config.exchangeRateUpdated = new Date().toISOString();
      saveDB();
      updateFxWidget();
      return;
    }
  } catch(e) {}
  // Fallback: use cached or manual
  if(DB.config.exchangeRate) { _fxRate = DB.config.exchangeRate; }
  _fxUpdated = DB.config.exchangeRateUpdated ? new Date(DB.config.exchangeRateUpdated).toLocaleTimeString('es-CR',{hour:'2-digit',minute:'2-digit'}) : 'sin conexión';
  updateFxWidget();
}

function updateFxWidget() {
  const el = document.getElementById('fx-rate-val');
  const upd = document.getElementById('fx-rate-updated');
  if(el) el.textContent = '₡' + _fxRate.toLocaleString('es-CR',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' / $1';
  if(upd) upd.textContent = 'Actualizado: ' + (_fxUpdated||'—');
}

function usdToCrc(usd) { return usd * _fxRate; }
function crcToUsd(crc) { return parseFloat((crc / _fxRate).toFixed(2)); }

function convertToDisplay(amount, fromCurr, toCurr) {
  if(fromCurr === toCurr) return amount;
  if(fromCurr==='USD' && toCurr==='CRC') return usdToCrc(amount);
  if(fromCurr==='CRC' && toCurr==='USD') return crcToUsd(amount);
  return amount;
}

// Schedule auto-refresh twice daily
function scheduleFxRefresh() {
  fetchExchangeRate();
  setInterval(fetchExchangeRate, 6*60*60*1000); // every 6 hours
}

let _statMode = 'original'; // 'original' | 'usd' | 'crc'

function setStatMode(mode) {
  _statMode = mode;
  document.querySelectorAll('.sct-btn').forEach(b => b.classList.toggle('on', b.dataset.mode===mode));
  renderDashboardStats();
}

function toStatCurr(amount, fromCurr) {
  if(_statMode === 'original') return {val:amount, curr:fromCurr};
  if(_statMode === 'usd') return {val: convertToDisplay(amount,fromCurr,'USD'), curr:'USD'};
  if(_statMode === 'crc') return {val: convertToDisplay(amount,fromCurr,'CRC'), curr:'CRC'};
  return {val:amount, curr:fromCurr};
}

function sumInvs(invList) {
  return invList.reduce((a,inv)=>{
    const conv = toStatCurr(inv.total, inv.currency||'USD');
    return a + conv.val;
  }, 0);
}

function statCurrSymbol() {
  if(_statMode==='usd') return 'USD';
  if(_statMode==='crc') return 'CRC';
  return co()?.currency||'USD';
}

let _reportPeriod = 'month';
let _reportFrom = '';
let _reportTo = '';

function getReportInvoices() {
  const invs = coInvs();
  const now = new Date();
  let from, to;
  const t = today();

  if(_reportPeriod==='week') {
    const d = new Date(); d.setDate(d.getDate()-7);
    from = d.toISOString().split('T')[0]; to = t;
  } else if(_reportPeriod==='biweek') {
    const d = new Date(); d.setDate(d.getDate()-14);
    from = d.toISOString().split('T')[0]; to = t;
  } else if(_reportPeriod==='month') {
    from = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`; to = t;
  } else if(_reportPeriod==='quarter') {
    const d = new Date(); d.setMonth(d.getMonth()-3);
    from = d.toISOString().split('T')[0]; to = t;
  } else if(_reportPeriod==='year') {
    from = `${now.getFullYear()}-01-01`; to = t;
  } else if(_reportPeriod==='custom') {
    from = _reportFrom; to = _reportTo;
  } else {
    return invs; // all
  }
  return invs.filter(i=>i.date>=from && i.date<=to);
}

function exportReportExcel() {
  const invs = getReportInvoices();
  if(!invs.length){toast('Sin facturas en el período','warn');return;}
  if(typeof XLSX==='undefined'){toast('SheetJS no disponible','err');return;}
  const rows = [['N° Factura','Cliente','Email','Fecha','Vencimiento','Estado','Moneda','Subtotal','IVA','Total','Condición','Forma de Pago','Empresa']];
  invs.forEach(inv=>{
    const company = DB.companies.find(c=>c.id===inv.coId)||{};
    rows.push([inv.id,inv.clName,inv.clEmail,inv.date,inv.dueDate,inv.status,inv.currency||'USD',inv.subtotal||0,inv.tax>0?(inv.subtotal*inv.tax).toFixed(2):0,inv.total,inv.condicionVenta||'—',inv.formaPago||'—',company.name||'—']);
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:14},{wch:28},{wch:32},{wch:12},{wch:12},{wch:11},{wch:8},{wch:12},{wch:10},{wch:12},{wch:10},{wch:14},{wch:26}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Facturas');
  const period = _reportPeriod==='custom'?`${_reportFrom}_${_reportTo}`:_reportPeriod;
  XLSX.writeFile(wb, `FactuFlow_Reporte_${period}_${today()}.xlsx`);
  toast('Reporte Excel exportado ✓');

  let revPrimary, revEquiv, pendPrimary, pendEquiv, primCurr, equivCurr;

  if(_statMode==='original') {
    primCurr = coCurr;
